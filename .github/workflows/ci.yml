name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==================== BACKEND ====================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: adorela_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/adorela_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://example.com/realms/test
        run: ./mvnw clean verify

  # ==================== FRONTEND ====================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: adorela-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adorela-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint & Build
        run: |
          npm run build

      - name: Run tests
        run: npm test -- --run
