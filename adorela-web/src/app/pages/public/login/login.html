<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Adorela</h1>
    <p class="login-subtitle">Acesso Restrito ao Painel</p>

    <div class="login-actions" style="margin-top: 2rem;">
      <button (click)="onLogin()" class="btn-login" style="padding: 1rem; width: 100%; font-size: 1.1rem; cursor: pointer;">
        Fazer Login Seguro
      </button>
    </div>

    <div class="login-divider"></div>
    <p class="login-hint">O login oficial será gerenciado pelo Keycloak.</p>
  </div>
</div>
