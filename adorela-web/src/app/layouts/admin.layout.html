<div class="min-h-screen bg-sand flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-crust-brown text-cream flex flex-col shadow-2xl transition-all duration-300">
    <div class="h-20 flex items-center justify-center border-b border-white/10 px-6">
      <div class="flex items-center gap-3 text-bread-gold">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span class="text-2xl font-serif font-bold tracking-wider">Adorela</span>
      </div>
    </div>

    <nav class="flex-grow py-8 px-4 flex flex-col gap-8">
      <div>
        <span class="text-xs font-bold text-white/40 uppercase tracking-widest px-4 mb-3 block">Menu</span>
        <a routerLink="/admin" routerLinkActive="bg-white/10 text-bread-gold" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors font-medium">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Dashboard
        </a>
      </div>

      <div>
        <span class="text-xs font-bold text-white/40 uppercase tracking-widest px-4 mb-3 block">Gerenciar</span>
        <a routerLink="/admin/produtos" routerLinkActive="bg-white/10 text-bread-gold" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors font-medium mb-1">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          Produtos
        </a>
        <a routerLink="/admin/categorias" routerLinkActive="bg-white/10 text-bread-gold" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition-colors font-medium">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          Categorias
        </a>
      </div>
    </nav>

    <div class="p-4 border-t border-white/10">
      <button (click)="logout()" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl text-white/70 hover:text-white hover:bg-red-500/20 transition-colors font-medium">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-grow flex flex-col relative overflow-hidden">
    <!-- Header -->
    <header class="h-20 bg-cream/80 backdrop-blur-md flex items-center justify-between px-8 border-b border-sand/50 z-10 sticky top-0">
      <h2 class="text-2xl font-serif font-bold text-crust-brown drop-shadow-sm">Painel Administrativo</h2>
      
      <div class="flex items-center gap-4">
        <div class="hidden md:flex flex-col items-end">
          <span class="text-sm font-bold text-crust-brown">Admin</span>
          <span class="text-xs text-crust-brown/60">Gestor</span>
        </div>
        <div class="w-10 h-10 rounded-full bg-bread-gold flex items-center justify-center text-white font-bold shadow-md">
          A
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <section class="p-8 overflow-y-auto h-[calc(100vh-5rem)]">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
