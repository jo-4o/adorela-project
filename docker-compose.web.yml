# =====================================================================
# VM 3 - Frontend Web (Angular + Nginx)
# Execute: docker compose -f docker-compose.web.yml --env-file .env up -d
#
# Antes de rodar, faça o build da imagem:
#   docker build -t adorela-web:latest ./adorela-web
# =====================================================================
services:
  web:
    image: adorela-web:latest
    build:
      context: ./adorela-web
      dockerfile: Dockerfile
    container_name: adorela-web
    restart: unless-stopped
    environment:
      # Proxy reverso: Nginx encaminha /api/ para o backend
      API_HOST: ${API_HOST:-localhost}
      API_PORT: ${API_PORT:-8080}
      # Configuração do Keycloak (injetado no browser via env.js)
      API_URL: ${API_URL:-}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-adorela}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-adorela-web}
    ports:
      - "80:80"
