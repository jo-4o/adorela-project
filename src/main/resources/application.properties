# Nome da Aplicação
spring.application.name=adorela

# Configurações do Banco de Dados PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/adorela}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
# O Hibernate 7+ detecta o dialeto automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Impedir o aviso de Open-In-View para melhor performance
spring.jpa.open-in-view=false

# Inicialização de dados (executa data.sql após criar schema)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Porta do Servidor
server.port=8080

# OAuth2 / Keycloak (ajuste a porta se mapear o container)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8181/realms/adorela}
# URL interna do Keycloak (para buscar JWKS quando issuer público difere do endereço interno)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:}

# CORS - origens permitidas (separadas por vírgula)
adorela.cors.allowed-origins=${ADORELA_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Configurações de upload de arquivos
adorela.upload.dir=${ADORELA_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html